<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApprovalFlow — Login</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { display: flex; min-height: 100vh; align-items: center; justify-content: center; background: var(--primary-light); }
  .login-page { width: 100%; max-width: 360px; padding: 1rem; }
  .login-page h1 { text-align: center; margin-top: 0; font-size: 1.3rem; }
</style>
</head>
<body>
<div class="login-page">
  <div class="card">
    <h1>ApprovalFlow Login</h1>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" required autocomplete="username" placeholder="dana">

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">

      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <div id="result" class="alert"></div>
  </div>
</div>

<script>
const GATEWAY_URL = "http://localhost:5000";

// Landing page per role after login.
const LANDING_PAGE = { submitter: "index.html", approver: "approval-queue.html", admin: "dashboard.html" };

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const resultEl = document.getElementById("result");
  resultEl.className = "alert";

  try {
    const res = await fetch(`${GATEWAY_URL}/auth/token`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    if (!res.ok) {
      resultEl.className = "alert error";
      resultEl.textContent = res.status === 401 ? "Invalid username or password." : `${res.status} - Login failed. Please try again.`;
      return;
    }

    const data = await res.json();
    localStorage.setItem("af_token", data.token);
    localStorage.setItem("af_username", data.username);
    localStorage.setItem("af_role", data.role);

    window.location.href = LANDING_PAGE[data.role] ?? "index.html";
  } catch (err) {
    resultEl.className = "alert error";
    resultEl.textContent = `Request failed: ${err.message}`;
  }
});
</script>
</body>
</html>
