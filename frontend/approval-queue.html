<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApprovalFlow — Approval Queue</title>
<link rel="stylesheet" href="styles.css">
<style>
  .approver-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .approver-row label { margin: 0; font-weight: 600; font-size: 0.9rem; white-space: nowrap; }
  .approver-row input { margin: 0; width: 260px; }
  .queue-card { margin-top: 1.25rem; }
  .queue-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .queue-card-header h3 { margin: 0; font-size: 1.15rem; }
  .queue-card-header .invoice-id { color: var(--gray); font-size: 0.8rem; margin-top: 0.15rem; }
  dl { display: grid; grid-template-columns: 9rem 1fr; gap: 0.4rem 1rem; margin: 1rem 0 0; font-size: 0.9rem; }
  dt { font-weight: 600; color: var(--gray); }
  dd { margin: 0; word-break: break-word; }
  .reasoning-box { background: var(--gray-bg); border-radius: 6px; padding: 0.65rem 0.8rem; font-size: 0.9rem; color: #333; }
  .confidence-green { color: var(--green); font-weight: 700; }
  .confidence-orange { color: var(--orange); font-weight: 700; }
  .comment-row { margin-top: 1rem; }
  .comment-row label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.3rem; }
  .comment-row textarea { resize: vertical; }
  .actions { margin-top: 0.9rem; display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .decision-result { margin-top: 0.6rem; font-size: 0.9rem; color: var(--gray); }
  #empty, #load-error { color: var(--gray); margin-top: 1.5rem; }
  #load-error { color: var(--red); }
</style>
</head>
<body>
<div class="navbar">
  <div class="navbar-inner">
    <div class="navbar-links">
      <a href="index.html">Submit</a>
      <a href="status.html">Status</a>
      <a href="approval-queue.html" class="active">Approval Queue</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="navbar-user" id="whoami"></div>
  </div>
</div>

<div class="page">
  <h1>Approval Queue</h1>

  <div class="card approver-row">
    <label for="approverId">Approver ID:</label>
    <input type="text" id="approverId" value="approver@clearspend.example">
    <button id="refresh-btn" class="btn btn-gray">Refresh</button>
  </div>

  <div id="queue"></div>
  <div id="empty" style="display:none;">No invoices waiting for human review.</div>
  <div id="load-error" style="display:none;"></div>
</div>

<script>
const GATEWAY_URL = "http://localhost:5000";

const token = localStorage.getItem("af_token");
if (!token) {
  window.location.href = "login.html";
}
document.getElementById("whoami").innerHTML =
  `<span>${localStorage.getItem("af_username")}</span><span class="role-badge">${localStorage.getItem("af_role")}</span><button id="logout-link">Log out</button>`;
document.getElementById("logout-link").addEventListener("click", (e) => {
  e.preventDefault();
  localStorage.clear();
  window.location.href = "login.html";
});

async function authFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers || {}), Authorization: `Bearer ${token}` }
  });
  if (res.status === 401) {
    localStorage.clear();
    window.location.href = "login.html";
  }
  return res;
}

const ERROR_LABELS = {
  400: "400 - Bad Request",
  401: "401 - Unauthorized",
  403: "403 - Forbidden — you don't have permission for this action",
  404: "404 - Not Found",
  409: "409 - Conflict",
  429: "429 - Too Many Requests, please slow down",
  500: "500 - Server Error"
};

async function describeError(res) {
  const label = ERROR_LABELS[res.status] || `${res.status} - Error`;
  const text = await res.text();
  return text ? `${label}: ${text}` : label;
}

async function loadQueue() {
  const queueEl = document.getElementById("queue");
  const emptyEl = document.getElementById("empty");
  const errorEl = document.getElementById("load-error");
  queueEl.innerHTML = "";
  emptyEl.style.display = "none";
  errorEl.style.display = "none";

  try {
    const res = await authFetch(`${GATEWAY_URL}/invoices/pending`);

    if (!res.ok) {
      errorEl.style.display = "block";
      errorEl.textContent = await describeError(res);
      return;
    }

    const data = await res.json();

    if (!data.length) {
      emptyEl.style.display = "block";
      return;
    }

    for (const inv of data) {
      queueEl.appendChild(renderCard(inv));
    }
  } catch (err) {
    errorEl.style.display = "block";
    errorEl.textContent = `Request failed: ${err.message}`;
  }
}

function renderCard(inv) {
  const card = document.createElement("div");
  card.className = "card queue-card";

  const violations = (inv.policyViolations && inv.policyViolations.length)
    ? inv.policyViolations.join(", ")
    : "—";

  let confidenceHtml = "—";
  if (inv.agentConfidence != null) {
    const pct = inv.agentConfidence * 100;
    const cls = pct > 80 ? "confidence-green" : "confidence-orange";
    confidenceHtml = `<span class="${cls}">${pct.toFixed(0)}%</span>`;
  }

  card.innerHTML = `
    <div class="queue-card-header">
      <div>
        <h3>${inv.vendor} — $${Number(inv.total).toFixed(2)}</h3>
        <div class="invoice-id">${inv.invoiceId}</div>
      </div>
      <span class="badge badge-orange">waiting_for_human</span>
    </div>
    <dl>
      <dt>Deterministic Reason</dt><dd>${inv.deterministicReason ?? "—"}</dd>
      <dt>Confidence</dt><dd>${confidenceHtml}</dd>
      <dt>Policy Violations</dt><dd>${violations}</dd>
      <dt>Agent Reasoning</dt><dd><div class="reasoning-box">${inv.agentReasoning ?? "—"}</div></dd>
    </dl>
    <div class="comment-row">
      <label>Comment (optional)</label>
      <textarea class="comment" rows="2" placeholder="Reason for this decision..."></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-green approve">Approve</button>
      <button class="btn btn-red reject">Reject</button>
      <button class="btn btn-gray info">Request More Info</button>
    </div>
    <div class="decision-result"></div>
  `;

  card.querySelector(".approve").addEventListener("click", () => decide(inv.invoiceId, "approve", card));
  card.querySelector(".reject").addEventListener("click", () => decide(inv.invoiceId, "reject", card));
  card.querySelector(".info").addEventListener("click", () => decide(inv.invoiceId, "request_more_info", card));

  return card;
}

async function decide(invoiceId, action, card) {
  const approverId = document.getElementById("approverId").value.trim();
  const comment = card.querySelector(".comment").value.trim();
  const resultEl = card.querySelector(".decision-result");
  resultEl.textContent = "Submitting...";

  try {
    const res = await authFetch(`${GATEWAY_URL}/invoices/${encodeURIComponent(invoiceId)}/decision`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, approverId, comment: comment || null })
    });
    if (!res.ok) {
      resultEl.textContent = await describeError(res);
      return;
    }

    const data = await res.json();

    resultEl.textContent = `Done — status is now "${data.status}".`;
    setTimeout(loadQueue, 800);
  } catch (err) {
    resultEl.textContent = `Request failed: ${err.message}`;
  }
}

document.getElementById("refresh-btn").addEventListener("click", loadQueue);
loadQueue();
</script>
</body>
</html>
