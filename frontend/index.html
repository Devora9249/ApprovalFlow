<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApprovalFlow — Submit Invoice</title>
<link rel="stylesheet" href="styles.css">
<style>
  .line-items { margin-top: 0.5rem; }
  .line-item-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
  .line-item-row input { margin-top: 0; }
  .line-item-row input[data-field="description"] { flex: 3; }
  .line-item-row input[data-field="total"] { flex: 1; }
  .line-item-row .remove-item { padding: 0.4rem 0.7rem; margin-top: 0; flex: 0 0 auto; }
  .add-item { margin-top: 0.75rem; }
  .items-sum { margin-top: 0.5rem; color: var(--gray); font-size: 0.85rem; }
</style>
</head>
<body>
<div class="navbar">
  <div class="navbar-inner">
    <div class="navbar-links">
      <a href="index.html" class="active">Submit</a>
      <a href="status.html">Status</a>
      <a href="approval-queue.html">Approval Queue</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="navbar-user" id="whoami"></div>
  </div>
</div>

<div class="page narrow">
  <h1>Submit Invoice</h1>

  <div class="card">
    <form id="invoice-form">
      <label for="submitter">Submitter (email)</label>
      <input type="email" id="submitter" required placeholder="jane.doe@clearspend.example">

      <label for="vendor">Vendor</label>
      <input type="text" id="vendor" required placeholder="Staples">

      <label for="invoiceNumber">Invoice Number</label>
      <input type="text" id="invoiceNumber" required placeholder="INV-2001">

      <label for="category">Category</label>
      <select id="category" required>
        <option value="office_supplies">office_supplies</option>
        <option value="business_meals">business_meals</option>
        <option value="transportation">transportation</option>
        <option value="software">software</option>
        <option value="hardware">hardware</option>
      </select>

      <label for="total">Total ($)</label>
      <input type="number" id="total" required min="0.01" step="0.01" placeholder="42.00">

      <label for="taxAmount">Tax Amount ($)</label>
      <input type="number" id="taxAmount" required min="0" step="0.01" value="0">

      <label for="description">Description</label>
      <textarea id="description" required rows="3" placeholder="Working lunch with client"></textarea>

      <label>Line Items</label>
      <div class="line-items" id="line-items"></div>
      <button type="button" class="btn btn-gray btn-sm add-item" id="add-item-btn">+ Add line item</button>
      <div class="items-sum" id="items-sum"></div>

      <div class="checkbox-row">
        <input type="checkbox" id="receiptPresent">
        <label for="receiptPresent">Receipt attached</label>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Submit Invoice</button>
    </form>
  </div>

  <div id="result" class="alert"></div>
</div>

<script>
const GATEWAY_URL = "http://localhost:5000";

const token = localStorage.getItem("af_token");
if (!token) {
  window.location.href = "login.html";
}
document.getElementById("whoami").innerHTML =
  `<span>${localStorage.getItem("af_username")}</span><span class="role-badge">${localStorage.getItem("af_role")}</span><button id="logout-link">Log out</button>`;
document.getElementById("logout-link").addEventListener("click", (e) => {
  e.preventDefault();
  localStorage.clear();
  window.location.href = "login.html";
});

async function authFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers || {}), Authorization: `Bearer ${token}` }
  });
  if (res.status === 401) {
    localStorage.clear();
    window.location.href = "login.html";
  }
  return res;
}

const ERROR_LABELS = {
  400: "400 - Bad Request",
  401: "401 - Unauthorized",
  403: "403 - Forbidden — you don't have permission for this action",
  404: "404 - Not Found",
  409: "409 - Conflict",
  429: "429 - Too Many Requests, please slow down",
  500: "500 - Server Error"
};

async function describeError(res) {
  const label = ERROR_LABELS[res.status] || `${res.status} - Error`;
  const text = await res.text();
  return text ? `${label}: ${text}` : label;
}

const lineItemsEl = document.getElementById("line-items");

function addLineItemRow(description = "", total = "") {
  const row = document.createElement("div");
  row.className = "line-item-row";
  row.innerHTML = `
    <input type="text" data-field="description" placeholder="Item description" value="${description}">
    <input type="number" data-field="total" placeholder="0.00" step="0.01" min="0" value="${total}">
    <button type="button" class="btn btn-gray btn-sm remove-item">✕</button>
  `;
  row.querySelector(".remove-item").addEventListener("click", () => {
    row.remove();
    updateItemsSum();
  });
  row.querySelectorAll("input").forEach(input => input.addEventListener("input", updateItemsSum));
  lineItemsEl.appendChild(row);
  updateItemsSum();
}

function getLineItems() {
  return Array.from(lineItemsEl.querySelectorAll(".line-item-row")).map(row => ({
    description: row.querySelector('[data-field="description"]').value,
    total: parseFloat(row.querySelector('[data-field="total"]').value) || 0
  }));
}

function updateItemsSum() {
  const sum = getLineItems().reduce((acc, item) => acc + item.total, 0);
  const tax = parseFloat(document.getElementById("taxAmount").value) || 0;
  const total = parseFloat(document.getElementById("total").value) || 0;
  const expected = sum + tax;
  const sumEl = document.getElementById("items-sum");
  const matches = Math.abs(expected - total) < 0.005;
  sumEl.textContent = `Line items + tax = $${expected.toFixed(2)} ${matches ? "✓ matches total" : `— total is $${total.toFixed(2)}, will trigger GLOBAL-MATH escalation if it doesn't match`}`;
}

document.getElementById("add-item-btn").addEventListener("click", () => addLineItemRow());
document.getElementById("total").addEventListener("input", updateItemsSum);
document.getElementById("taxAmount").addEventListener("input", updateItemsSum);
addLineItemRow();

document.getElementById("invoice-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    submitter: document.getElementById("submitter").value,
    vendor: document.getElementById("vendor").value,
    invoiceNumber: document.getElementById("invoiceNumber").value,
    category: document.getElementById("category").value,
    total: parseFloat(document.getElementById("total").value),
    taxAmount: parseFloat(document.getElementById("taxAmount").value) || 0,
    receiptPresent: document.getElementById("receiptPresent").checked,
    description: document.getElementById("description").value,
    lineItems: getLineItems()
  };

  const resultEl = document.getElementById("result");
  resultEl.className = "alert";
  resultEl.textContent = "Submitting...";
  resultEl.style.display = "block";

  try {
    const res = await authFetch(`${GATEWAY_URL}/invoices`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      const data = await res.json();
      resultEl.className = "alert ok";
      resultEl.innerHTML = `<strong>Received.</strong><br>Tracking ID: <span class="tracking-id">${data.trackingId}</span><br>Status: ${data.status}`;
    } else {
      resultEl.className = "alert error";
      resultEl.textContent = await describeError(res);
    }
  } catch (err) {
    resultEl.className = "alert error";
    resultEl.textContent = `Request failed: ${err.message}`;
  }
});
</script>
</body>
</html>
