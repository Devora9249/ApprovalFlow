<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApprovalFlow — Invoice Status</title>
<link rel="stylesheet" href="styles.css">
<style>
  .lookup-row { display: flex; gap: 0.6rem; }
  .lookup-row input { margin: 0; }
  .lookup-row button { flex: 0 0 auto; }
  #result { margin-top: 1.25rem; }
  #result.error { color: var(--red); font-weight: 600; }
  #result .status-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
  #result .status-header h2 { margin: 0; font-size: 1.1rem; }
  dl { display: grid; grid-template-columns: 11rem 1fr; gap: 0.5rem 1rem; margin-top: 0; font-size: 0.92rem; }
  dt { font-weight: 600; color: var(--gray); }
  dd { margin: 0; word-break: break-word; }
  details.reasoning { margin-top: 1rem; }
  details.reasoning summary { cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--primary); }
  details.reasoning .reasoning-box { margin-top: 0.5rem; background: var(--gray-bg); border-radius: 6px; padding: 0.65rem 0.8rem; font-size: 0.9rem; color: #333; }
</style>
</head>
<body>
<div class="navbar">
  <div class="navbar-inner">
    <div class="navbar-links">
      <a href="index.html">Submit</a>
      <a href="status.html" class="active">Status</a>
      <a href="approval-queue.html">Approval Queue</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="navbar-user" id="whoami"></div>
  </div>
</div>

<div class="page narrow">
  <h1>Check Invoice Status</h1>

  <div class="card lookup-row">
    <input type="text" id="trackingId" placeholder="Tracking ID">
    <button id="check-btn" class="btn btn-primary">Check</button>
  </div>

  <div id="result"></div>
</div>

<script>
const GATEWAY_URL = "http://localhost:5000";

const token = localStorage.getItem("af_token");
if (!token) {
  window.location.href = "login.html";
}
document.getElementById("whoami").innerHTML =
  `<span>${localStorage.getItem("af_username")}</span><span class="role-badge">${localStorage.getItem("af_role")}</span><button id="logout-link">Log out</button>`;
document.getElementById("logout-link").addEventListener("click", (e) => {
  e.preventDefault();
  localStorage.clear();
  window.location.href = "login.html";
});

async function authFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers || {}), Authorization: `Bearer ${token}` }
  });
  if (res.status === 401) {
    localStorage.clear();
    window.location.href = "login.html";
  }
  return res;
}

const ERROR_LABELS = {
  400: "400 - Bad Request",
  401: "401 - Unauthorized",
  403: "403 - Forbidden — you don't have permission for this action",
  404: "404 - Not Found",
  409: "409 - Conflict",
  429: "429 - Too Many Requests, please slow down",
  500: "500 - Server Error"
};

async function describeError(res) {
  const label = ERROR_LABELS[res.status] || `${res.status} - Error`;
  const text = await res.text();
  return text ? `${label}: ${text}` : label;
}

const GREEN_STATUSES = new Set(["auto_approved", "approved", "paid"]);
const RED_STATUSES = new Set(["rejected", "payment_failed", "payment-failed"]);
const ORANGE_STATUSES = new Set(["waiting_for_human"]);

function badgeClassFor(status) {
  if (GREEN_STATUSES.has(status)) return "badge-green";
  if (RED_STATUSES.has(status)) return "badge-red";
  if (ORANGE_STATUSES.has(status)) return "badge-orange";
  return "badge-gray";
}

async function checkStatus() {
  const id = document.getElementById("trackingId").value.trim();
  const resultEl = document.getElementById("result");
  resultEl.className = "";

  if (!id) {
    resultEl.className = "error";
    resultEl.textContent = "Enter a tracking ID.";
    return;
  }

  resultEl.textContent = "Checking...";

  try {
    const res = await authFetch(`${GATEWAY_URL}/invoices/${encodeURIComponent(id)}/status`);

    if (res.status === 404) {
      resultEl.className = "error";
      resultEl.textContent = "No invoice found for that tracking ID.";
      return;
    }

    if (!res.ok) {
      resultEl.className = "error";
      resultEl.textContent = await describeError(res);
      return;
    }

    const data = await res.json();

    const violations = (data.policyViolations && data.policyViolations.length)
      ? data.policyViolations.join(", ")
      : "—";

    const status = data.status ?? "—";
    const badgeHtml = `<span class="badge ${badgeClassFor(status)}">${status}</span>`;

    const reasoningHtml = data.agentReasoning
      ? `<details class="reasoning"><summary>Agent Reasoning</summary><div class="reasoning-box">${data.agentReasoning}</div></details>`
      : "";

    resultEl.className = "card";
    resultEl.innerHTML = `
      <div class="status-header">
        <h2>Invoice ${id}</h2>
        ${badgeHtml}
      </div>
      <dl>
        <dt>Deterministic Result</dt><dd>${data.deterministicResult ?? "—"}</dd>
        <dt>Deterministic Reason</dt><dd>${data.deterministicReason ?? "—"}</dd>
        <dt>Final Decision</dt><dd>${data.finalDecision ?? "—"}</dd>
        <dt>Policy Violations</dt><dd>${violations}</dd>
        <dt>Payment Status</dt><dd>${data.paymentStatus ?? "—"}</dd>
      </dl>
      ${reasoningHtml}
    `;
  } catch (err) {
    resultEl.className = "error";
    resultEl.textContent = `Request failed: ${err.message}`;
  }
}

document.getElementById("check-btn").addEventListener("click", checkStatus);
document.getElementById("trackingId").addEventListener("keydown", (e) => {
  if (e.key === "Enter") checkStatus();
});
</script>
</body>
</html>
