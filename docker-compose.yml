services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  ingestion-service:
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=Asia/Jerusalem
    volumes:
      - "./logs/ingestion-service:/app/logs"
    depends_on:
      - redis

  ingestion-service-dapr:
    image: "daprio/daprd:1.18.1"
    command:
      [
        "./daprd",
        "-app-id", "ingestion-service",
        "-app-port", "8080",
        "-dapr-http-port", "3500",
        "-resources-path", "/components"
      ]
    volumes:
      - "./dapr/components/:/components"
    depends_on:
      - ingestion-service
    network_mode: "service:ingestion-service"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=Asia/Jerusalem
      - Jwt__Secret=${JWT_SECRET}
    volumes:
      - "./logs/gateway:/app/logs"
    depends_on:
      - ingestion-service

  gateway-dapr:
    image: "daprio/daprd:1.18.1"
    command:
      [
        "./daprd",
        "-app-id", "gateway",
        "-app-port", "8080",
        "-dapr-http-port", "3500",
        "-resources-path", "/components"
      ]
    volumes:
      - "./dapr/components/:/components"
    depends_on:
      - gateway
    network_mode: "service:gateway"

  decision-service:
    build:
      context: .
      dockerfile: decision-service/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=Asia/Jerusalem
      - Autonomy__CeilingAmount=${AUTONOMY_CEILING:-500}
      - Autonomy__ConfidenceThreshold=${AUTONOMY_CONFIDENCE:-0.80}
      - Autonomy__WhiteListCategories=${WHITELIST_CATEGORIES:-office_supplies,business_meals,transportation,software,hardware}
      - Autonomy__KnownVendors=${KNOWN_VENDORS:-Staples,Amazon,Uber,Bistro 19,Microsoft,Dell Technologies,Delta Airlines}
      - Llm__Provider=${LLM_PROVIDER:-gemini}
      - Llm__Model=${LLM_MODEL:-gemini-2.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - "./logs/decision-service:/app/logs"
    depends_on:
      - redis

  decision-service-dapr:
    image: "daprio/daprd:1.18.1"
    command:
      [
        "./daprd",
        "-app-id", "decision-service",
        "-app-port", "8080",
        "-dapr-http-port", "3500",
        "-resources-path", "/components"
      ]
    volumes:
      - "./dapr/components/:/components"
    depends_on:
      - decision-service
    network_mode: "service:decision-service"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TZ=Asia/Jerusalem
      - FORCE_PAYMENT_FAIL=${FORCE_PAYMENT_FAIL:-false}
    volumes:
      - "./logs/payment-service:/app/logs"
    depends_on:
      - redis

  payment-service-dapr:
    image: "daprio/daprd:1.18.1"
    command:
      [
        "./daprd",
        "-app-id", "payment-service",
        "-app-port", "8080",
        "-dapr-http-port", "3500",
        "-resources-path", "/components"
      ]
    volumes:
      - "./dapr/components/:/components"
    depends_on:
      - payment-service
    network_mode: "service:payment-service"
